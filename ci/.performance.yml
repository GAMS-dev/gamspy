leg-performance:
  stage: performance
  needs: []
  allow_failure: true
  tags: [puma]
  image: ghcr.io/astral-sh/uv:python3.12-trixie-slim
  when: manual
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl
  script:
    - curl --silent https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -o Miniconda3-latest-Linux-x86_64.sh
    - sh Miniconda3-latest-Linux-x86_64.sh -b -p anaconda3
    - source anaconda3/bin/activate
    - conda create -y performance python=3.12
    - conda activate performance
    - conda install -y -c conda-forge cyipopt
    - uv pip install . --group test --group doc --group dev
    - uv pip install highsbox llvmlite tccbox psutil pyoptinterface
    - gamspy install license $PERFORMANCE_LICENSE
    - echo $GAMS_LICENSE > $(python -m gamspy show base)/gamslice.txt
    - gamspy install solver -a --use-uv
    - which python
    - python scripts/performance/lp/main.py
    - gamspy install license $LOCAL_LICENSE
    - python scripts/performance/performance.py
    - python scripts/performance/read.py
    - python scripts/performance/main_IJKLM.py
    - python scripts/performance/memory_check.py
  artifacts:
    name: performance_stats
    expire_in: 2 hours
    paths:
      - stats.csv
