leg-upload-wheel:
  stage: upload
  needs: []
  allow_failure: true
  tags: [puma]
  image: ghcr.io/astral-sh/uv:python3.13-trixie-slim
  script:
    - uv venv .venv && source .venv/bin/activate
    - uv build && uv publish --username $PF_PYPI_USERNAME --password $PF_PYPI_PASSWORD
  rules:
    - if: $CI_COMMIT_BRANCH != "master"
      when: never
    - when: manual
